name: Keep Supabase Alive

on:
  schedule:
    - cron: "0 0 */3 * *" # every 3 days

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/likes?limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}"
