<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.sand.min.css"
    />
    <title>Hello world!</title>
  </head>

  <body>
    <main class="container">
      <h1>Hello world!</h1>
      <form>
        <fieldset>
          <label>
            First name
            <input
              name="first_name"
              placeholder="First name"
              autocomplete="given-name"
            />
          </label>
          <label>
            Email
            <input
              type="email"
              name="email"
              placeholder="Email"
              autocomplete="email"
            />
          </label>
        </fieldset>

        <input type="submit" value="Subscribe" />
      </form>
      <!-- <form class="pico"> -->
      <!--   <input type="text" name="text" placeholder="Text" aria-label="Text" /> -->
      <!-- </form> -->
      <form>
        <input type="text" name="text" placeholder="Text" aria-label="Text" />
      </form>

      <section>
        <p>Unstyled hello world!</p>
      </section>
      <section class="pico">
        <p>Styled hello world!</p>
      </section>

      <article class="media">
        <!-- <img -->
        <!--   class="media-img" -->
        <!--   src="/public/movies/little-forest-2018.avif" -->
        <!--   alt="little forest" -->
        <!--   loading="lazy" -->
        <!-- /> -->
        <div class="media-body">
          <h3 class="media-title">Little Forest (2018)</h3>
          <p class="media-text">
            A young woman grows tired of life in the city and returns to her
            hometown in the countryside.
          </p>
        </div>
      </article>
    </main>
  </body>
</html>
